name: C CI for Xenly programming language (python)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: python installing test
      run: time python3 install-c.py
    - name: xenly test (1)
      run: time ./xenly examples/hello.xe
    - name: xenlyc test (1)
      run: time ./xenlyc examples/hello.xe -o hello
    - name: hello test (1)
      run: time ./hello
    - name: xenly test (2)
      run: time ./xenly examples/sys_demo.xe
    - name: xenlyc test (2)
      run: time ./xenlyc examples/sys_demo.xe -o sys_demo
    - name: sys_demo test (2)
      run: time ./sys_demo
